syntax = "proto3";

package example.api;

import "types.proto";
import "google/api/annotations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/activatedio/apiinfra/examples/app/pb";

message GetProductRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
}

message ListProductRequest {
  string parent = 1;
  int32 page_size = 2;
  string page_token = 3;
  string filter = 4;
  string order_by = 5;
  google.protobuf.FieldMask read_mask = 6;
}

message ListProductResponse {
  repeated example.api.Product products = 1;
  string next_page_token = 2;
}

message CreateProductRequest {
  string parent = 1;
  example.api.Product product = 2;
}

message UpdateProductRequest {
  string name = 1;
  example.api.Product product = 2;
}

message PatchProductRequest {
  string name = 1;
  example.api.Product product = 2;
  google.protobuf.FieldMask update_mask = 3;
}

message DeleteProductRequest {
  string name = 1;
}

message GetProductReviewRequest {
  string name = 1;
  google.protobuf.FieldMask read_mask = 2;
}

message ListProductReviewRequest {
  string parent = 1;
  int32 page_size = 2;
  string page_token = 3;
  string filter = 4;
  string order_by = 5;
  google.protobuf.FieldMask read_mask = 6;
}

message ListProductReviewResponse {
  repeated example.api.ProductReview product_reviews = 1;
  string next_page_token = 2;
}

message CreateProductReviewRequest {
  string parent = 1;
  example.api.ProductReview product_review = 2;
}

message UpdateProductReviewRequest {
  string name = 1;
  example.api.ProductReview product_review = 2;
}

message PatchProductReviewRequest {
  string name = 1;
  example.api.ProductReview product_review = 2;
  google.protobuf.FieldMask update_mask = 3;
}

message DeleteProductReviewRequest {
  string name = 1;
}

message ArchiveProductRequest {
  string name = 1;
}

service ExampleApiService {
  rpc GetProduct (GetProductRequest) returns (example.api.Product) {
    option (google.api.http) = {
      get: "/v1/{name=products/*}"
    };
  }
  rpc ListProduct (ListProductRequest) returns (ListProductResponse) {
    option (google.api.http) = {
      get: "/v1/products"
    };
  }
  rpc CreateProduct (CreateProductRequest) returns (example.api.Product) {
    option (google.api.http) = {
      post: "/v1/products"
      body: "*"
    };
  }
  rpc UpdateProduct (UpdateProductRequest) returns (example.api.Product) {
    option (google.api.http) = {
      put: "/v1/{name=products/*}"
      body: "*"
    };
  }
  rpc PatchProduct (PatchProductRequest) returns (example.api.Product) {
    option (google.api.http) = {
      patch: "/v1/{name=products/*}"
      body: "*"
    };
  }
  rpc DeleteProduct (DeleteProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=products/*}"
    };
  }
  rpc GetProductReview (GetProductReviewRequest) returns (example.api.ProductReview) {
    option (google.api.http) = {
      get: "/v1/{name=products/*/product_reviews/*}"
    };
  }
  rpc ListProductReview (ListProductReviewRequest) returns (ListProductReviewResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=products/*}/product_reviews"
    };
  }
  rpc CreateProductReview (CreateProductReviewRequest) returns (example.api.ProductReview) {
    option (google.api.http) = {
      post: "/v1/{parent=products/*}/product_reviews"
      body: "*"
    };
  }
  rpc UpdateProductReview (UpdateProductReviewRequest) returns (example.api.ProductReview) {
    option (google.api.http) = {
      put: "/v1/{name=products/*/product_reviews/*}"
      body: "*"
    };
  }
  rpc PatchProductReview (PatchProductReviewRequest) returns (example.api.ProductReview) {
    option (google.api.http) = {
      patch: "/v1/{name=products/*/product_reviews/*}"
      body: "*"
    };
  }
  rpc DeleteProductReview (DeleteProductReviewRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/{name=products/*/product_reviews/*}"
    };
  }
  rpc ArchiveProduct (ArchiveProductRequest) returns (example.api.Product) {
    option (google.api.http) = {
      post: "/v1/{name=products/*}:archive"
      body: "*"
    };
  }
}

